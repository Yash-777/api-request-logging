#debug=true

# ════════════════════════════════════════════════════════════════════════════
#  Demo Application → api-request-logging-spring-boot-starter
#  Run with: mvn spring-boot:run
# ════════════════════════════════════════════════════════════════════════════
server.port=8080
spring.application.name=api-request-logging-demo

# TomcatWebServer : Tomcat started on port(s): 8080 (http) with context path '/api' (or) '/myworld'
#server.servlet.context-path=/

# ══ Starter: master switch (set false to disable all logging filters) ══════
api.request.logging.enabled=true

# ══ Correlation ID headers (first non-blank wins; UUID fallback) ═══════════
# Default is X-Request-ID.  Add more as comma-separated values:
api.request.logging.request-id-headers=X-Request-ID,request_id,X-Correlation-ID

# ══ Paths / extensions silently excluded from logging ══════════════════════
api.request.logging.exclude-paths=/actuator,/swagger-ui,/v3/api-docs,/v2/api-docs,/swagger-resources,/js/,/css/,/images/
api.request.logging.exclude-extensions=.js,.css,.html,.scss,.png,.jpg,.gif,.ico,.wsdl

# ══ Body / header capture toggles ══════════════════════════════════════════
api.request.logging.log-request-body=true
api.request.logging.log-response-body=true
api.request.logging.log-headers=true
# Comma-separated header names to omit entirely from the request log.
# Matching is case-insensitive. These never appear in the output.
# To mask (show key, hide value) use: api.request.logging.mask.fields instead.
api.request.logging.skip-headers=cache-control,accept-encoding,connection,\
	user-agent,postman-token,\
	sec-ch-ua,sec-ch-ua-mobile,sec-ch-ua-platform,sec-fetch-site,sec-fetch-mode,sec-fetch-user,sec-fetch-dest

# ══ Body truncation (characters); -1 = unlimited ══════════════════════════
api.request.logging.max-body-length=4096

# ══ Spring Boot Actuator (for health / info endpoints) ════════════════════
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=always

# ── AOP controller handler capture ───────────────────────────────────────────
# Requires spring-boot-starter-aop on the classpath.
# When absent, this setting is silently ignored.
api.request.logging.aop.controller-handler-enabled=true

# ── RestTemplate auto-capture ────────────────────────────────────────────────
# When true, all Spring-managed RestTemplate beans are auto-intercepted.
# Only beans declared as Spring beans are captured; new RestTemplate() is not. (default false).
api.request.logging.rest-template.auto-capture-enabled=true

api.request.logging.rest-template.log-request-body=true
api.request.logging.rest-template.log-response-body=true
#api.request.logging.rest-template.max-body-length=40   # Testing purpose
api.request.logging.rest-template.max-body-length=4096

# Skip credential-bearing endpoints (ends-with mode — works on any host)
api.request.logging.rest-template.skip.urls=/platform/oauth/oauth2/token
api.request.logging.rest-template.skip.urls-match-endswith=true

# Multiple patterns — comma-separated
# api.request.logging.rest-template.skip.urls=/oauth/token,/internal/health,/actuator/info

# Full URL mode (exact match including host and port)
# api.request.logging.rest-template.skip.urls=http://localhost:8080/platform/oauth/oauth2/token
# api.request.logging.rest-template.skip.urls-match-full=true

# ── Logger output ─────────────────────────────────────────────────────────────
# Routes log output to SLF4J at INFO level (default true).
# Configure the logger level and appenders in logback.xml / log4j2.xml:
#   logging.level.api.request.logging=INFO
api.request.logging.logger.enabled=true
api.request.logging.logger.name=api.request.logging
# Also print to System.out (v1.0.x legacy behaviour). Default false.
api.request.logging.logger.sysout-enabled=false

# ── Exception handling ────────────────────────────────────────────────────────
# Max stack-trace lines stored in the log. Full Spring traces are 60-100 lines;
# 5 lines is enough to identify the exception class and application frame.
api.request.logging.exception.max-lines=5

# ── Multipart / binary body skip ─────────────────────────────────────────────
# Prevents buffering large file uploads into heap. When skipped the log shows:
#   requestBody: [binary/multipart content skipped — Content-Type: image/png]
api.request.logging.multipart.skip-binary=true
api.request.logging.multipart.skip-content-types=image/,audio/,video/,multipart/,application/octet-stream
# Whitelist mode: capture ONLY these content types (overrides skip-binary when set)
# api.request.logging.multipart.capture-only-content-types=application/json,application/xml,text/

# ── Secret masking ────────────────────────────────────────────────────────────
# When enabled, field values matching mask.fields are replaced with mask.replacement
# in both request/response bodies and header values.   (default false).
api.request.logging.mask.enabled=true
api.request.logging.mask.fields=password,client-secret,passwd,credential,token,secret,\
	authorization,x-api-key,api-key,access-token,refresh-token,\
	orderId,txnId,latitude,longitude
api.request.logging.mask.replacement=***MASKED***

# ══════════════════════════════════════════════════════════════════════════════
# ── Demo internal marker ──────────────────────────────────────────────────────
# ══════════════════════════════════════════════════════════════════════════════
api.request.logging.live-demo=true

# ════════════════════════════════════════════════════════════════════════════
#  Demo-only reproduction toggles
#  These properties activate the demo fixtures in:
#    - EnableWebMVCConfig  (reproduces @EnableWebMvc filter-order issue)
#    - ApiDemoFilter       (reproduces consumer filter early-return body capture)
#
#  Both classes are guarded by @ConditionalOnDemoEnvironment in addition to
#  these properties, so they NEVER activate in a consumer application even if
#  these properties are set.
# ════════════════════════════════════════════════════════════════════════════

# ── ApiDemoFilter ─────────────────────────────────────────────────────────
# Set to true to activate the demo consumer filter that validates the
# mandatory 'location' header and calls sendError(401) when absent.
# Demonstrates that ApiLoggingFilter captures the request body and error
# response even when the chain is short-circuited.
#
# How to test:
#   curl -X POST http://localhost:8080/api/orders \
#        -H "Content-Type: application/json" \
#        -d '{"customerId":"C-101","itemName":"Laptop","amount":999.99}'
#
# Expected log (no 'location' header):
#   requestBodyType: raw
#   requestBody:     {"customerId":"C-101","itemName":"Laptop","amount":999.99}
#   responseStatus:  401
#   responseError:   Please provide the required 'location' header.
#
# Expected log (with -H "location: en"):
#   requestBodyType: raw
#   requestBody:     {"customerId":"C-101","itemName":"Laptop","amount":999.99}
#   responseStatus:  200
#   response:        {"orderId":"ORD-...","status":"CONFIRMED",...}
internal.app.non-consumer.filter=false


# ── EnableWebMVCConfig ────────────────────────────────────────────────────
# Set to true to activate @EnableWebMvc in the demo context.
# This intentionally disables WebMvcAutoConfiguration (and therefore
# OrderedRequestContextFilter at order -105) to reproduce the exception:
#   "No thread-bound request found: Scope 'request' is not active"
#
# The fix is in ApiRequestLoggingAutoConfiguration:
#   @Bean @ConditionalOnMissingBean(RequestContextFilter.class)
#   public OrderedRequestContextFilter starterRequestContextFilter() { ... }
#
# With the fix present, requests succeed normally even with @EnableWebMvc.
# Without the fix, every request throws BeanCreationException.
#
# WARNING: enabling this together with internal.app.non-consumer.filter=true
# is the most complete reproduction of a real consumer app scenario.
internal.app.non-consumer.web.mvc=false


# ── Redirect demo ─────────────────────────────────────────────────────────
# Activates RedirectDemoController and RedirectDemoFilter.
# Default false — set to true to test redirectPath log capture.
internal.app.non-consumer.redirect=true

# ════════════════════════════════════════════════════════════════════════════
#  OncePerRequest demo — filter, forward and include tests
#  Activates: ServletOncePerRequestFilter, SpringOncePerRequestFilter,
#             ControllerA, ControllerB, DashboardController, WidgetController
# ════════════════════════════════════════════════════════════════════════════
internal.app.non-consumer.once-per-request=false
